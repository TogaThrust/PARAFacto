<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PARAFacto Native — Téléchargement</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 42rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; }
    h1 { font-size: 1.5rem; }
    .btn { display: inline-block; padding: 0.6rem 1rem; background: #2563eb; color: #fff; text-decoration: none; border-radius: 6px; margin: 0.5rem 0.5rem 0.5rem 0; }
    .btn.secondary { background: #334155; }
    code { background: #f1f5f9; padding: 0.1rem 0.35rem; border-radius: 4px; }
    .lang-switch { display: inline-flex; align-items: center; gap: 0.25rem; }
    .flag-btn { width: 24px; height: 18px; padding: 0; border: 1px solid #cbd5e1; background: #fff; cursor: pointer; border-radius: 3px; overflow: hidden; display: inline-flex; align-items: center; justify-content: center; }
    .flag-btn.active { border-color: #2563eb; box-shadow: 0 0 0 1px #2563eb inset; }
    .flag-btn img { display: block; width: 18px; height: 12px; object-fit: cover; }
    .install-notice { background: #fef3c7; border: 1px solid #f59e0b; border-radius: 6px; padding: 0.65rem 0.85rem; margin: 0 0 1rem 0; font-size: 0.95rem; }
    .after-instructions { font-size: 0.95rem; color: #334155; line-height: 1.55; margin: 0.5rem 0 0 0; }
    .after-instructions p { margin: 0.4rem 0; }
    .after-instructions strong { font-weight: 700; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1 id="title">PARAFacto Native</h1>
    <div class="lang-switch" aria-label="Sélecteur de langue">
      <button type="button" class="flag-btn" data-lang="fr" title="Français">
        <img src="french.jpg" alt="" width="18" height="12" />
      </button>
      <button type="button" class="flag-btn" data-lang="en" title="English">
        <img src="english.jpg" alt="" width="18" height="12" />
      </button>
      <button type="button" class="flag-btn" data-lang="nl" title="Nederlands">
        <img src="dutch.jpg" alt="" width="18" height="12" />
      </button>
    </div>
  </div>
  <p id="installNotice" class="install-notice"></p>
  <p id="leadText"></p>
  <p>
    <a id="downloadBtn" class="btn" href="https://github.com/TogaThrust/PARAFacto/releases/latest/download/PARAFactoNative_Installer.exe" download>Télécharger l'installateur (.exe)</a>
  </p>
  <div id="afterText" class="after-instructions" aria-live="polite"></div>
  <script>
    (function () {
      var texts = {
        fr: {
          title: "PARAFacto Native",
          installNotice: "Mise à jour : fermez entièrement PARAFacto Native avant de lancer l'installateur, sinon l'installation peut échouer ou bloquer des fichiers.",
          lead: "Téléchargez l'installateur, lancez l'exe téléchargé. Quand l'app est installée, lancez l'app depuis le bureau. Rendez vous sur la page de paiements et souscrivez l'abonnement.",
          after: "<p>Après avoir souscrit l'abonnement, vous recevrez un <strong>code d'installation unique PAR E-MAIL</strong> (vérifiez votre boîte de réception <strong>et le dossier spam / courrier indésirable</strong>).</p><p><strong>Fermez entièrement puis rouvrez l'application</strong>, puis saisissez ce code dans la fenêtre affichée au démarrage. Ensuite, lisez et acceptez la politique de confidentialité et les conditions générales d'utilisation.</p>",
          btn: "Télécharger l’installateur (.exe)"
        },
        en: {
          title: "PARAFacto Native",
          installNotice: "Update: fully close PARAFacto Native before running the installer, otherwise setup may fail or lock files.",
          lead: "Download the installer and run the downloaded exe. Once the app is installed, launch it from the desktop. Go to the payment page and subscribe to the plan.",
          after: "<p>After subscribing, you will receive a <strong>unique installation code BY EMAIL</strong> (check your inbox <strong>and spam / junk</strong>).</p><p><strong>Fully close and restart the application</strong>, then enter the code in the window shown at startup. Then read and accept the privacy policy and terms of use.</p>",
          btn: "Download installer (.exe)"
        },
        nl: {
          title: "PARAFacto Native",
          installNotice: "Update: sluit PARAFacto Native volledig voordat u het installatieprogramma start, anders kan de installatie mislukken of bestanden vergrendelen.",
          lead: "Download het installatiebestand en start de gedownloade exe. Zodra de app is geïnstalleerd, start je de app vanaf het bureaublad. Ga naar de betaalpagina en neem een abonnement.",
          after: "<p>Na je inschrijving ontvang je een <strong>unieke installatiecode PER E-MAIL</strong> (controleer je inbox <strong>en de map ongewenst / spam</strong>).</p><p><strong>Sluit de toepassing volledig en start ze opnieuw op</strong>, plak daarna de code in het venster bij het opstarten. Lees en keur daarna het privacybeleid en de gebruiksvoorwaarden goed.</p>",
          btn: "Installatieprogramma downloaden (.exe)"
        }
      };

      var titleEl = document.getElementById("title");
      var installNoticeEl = document.getElementById("installNotice");
      var leadEl = document.getElementById("leadText");
      var afterEl = document.getElementById("afterText");
      var downloadBtn = document.getElementById("downloadBtn");
      var buttons = Array.prototype.slice.call(document.querySelectorAll(".flag-btn"));

      function applyLanguage(lang) {
        var key = texts[lang] ? lang : "fr";
        var t = texts[key];
        document.documentElement.lang = key;
        titleEl.textContent = t.title;
        installNoticeEl.textContent = t.installNotice || "";
        leadEl.textContent = t.lead;
        afterEl.innerHTML = t.after;
        downloadBtn.textContent = t.btn;
        buttons.forEach(function (b) { b.classList.toggle("active", b.getAttribute("data-lang") === key); });
        try { localStorage.setItem("parafacto_site_lang", key); } catch (_) { }
      }

      buttons.forEach(function (b) {
        b.addEventListener("click", function () { applyLanguage(b.getAttribute("data-lang")); });
      });

      var saved = "fr";
      try { saved = localStorage.getItem("parafacto_site_lang") || "fr"; } catch (_) { }
      applyLanguage(saved);

      fetch("app-version.json?_=" + Date.now(), { cache: "no-store" })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (j) {
          if (!j || typeof j.installerUrl !== "string") return;
          var u = j.installerUrl.trim();
          if (u.indexOf("https://") === 0 || u.indexOf("http://") === 0) downloadBtn.href = u;
        })
        .catch(function () { });
    })();
  </script>
</body>
</html>
